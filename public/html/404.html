<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Chubbuck</title>
    <meta name="description" content="Student @ Stanford University." />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&family=Geist+Mono:wght@400;500;700&family=Dancing+Script:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = window.matchMedia("(prefers-color-scheme:dark)").matches
            ? "dark"
            : "light";
        document.documentElement.classList.toggle("dark", t === "dark");
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <div class="ascii-corner ascii-left">
        <a
          href="https://xkcd.com/344/"
          target="_blank"
          tabindex="-1"
          aria-hidden="true"
          class="hover-lift"
        >
          <pre id="ascii-left"></pre>
        </a>
      </div>
      <div class="ascii-corner ascii-right">
        <a
          href="https://xkcd.com/344/"
          target="_blank"
          tabindex="-1"
          aria-hidden="true"
          class="hover-lift"
        >
          <pre id="ascii-right"></pre>
        </a>
      </div>
      <main class="main main--404">
        <h1 class="header title" data-title="BLANK"></h1>
        <img src="/svg/underline.svg" alt="" class="title-underline" />
        <div class="content-wrapper">
          <div id="terminal" class="terminal" role="log" aria-label="Terminal output">
            <div class="terminal-header">
              <button
                id="terminal-close"
                class="terminal-btn"
                aria-label="Close terminal"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  width="18"
                  height="18"
                >
                  <path d="M4 4l16 16M4 20L20 4" />
                </svg>
              </button>
              <button
                id="theme-toggle"
                class="theme-toggle-btn"
                aria-label="Toggle theme"
              ></button>
            </div>
            <pre class="terminal-body"><code id="terminal-output"></code></pre>
          </div>
        </div>
      </main>
      <footer class="footer">
        <div class="footer-content">
          <img src="/svg/footer-left.svg" alt="" class="footer-bracket" />
          <span id="footer-text" class="footer-text">Made with &#10084;&#65039; in California</span>
          <img src="/svg/footer-right.svg" alt="" class="footer-bracket" />
        </div>
      </footer>
      <script src="/static/js/terminal.js"></script>
      <script src="/static/js/easter-eggs.js"></script>
      <script src="/static/js/title.js"></script>
      <script src="/static/js/hover-lift.js"></script>
      <script src="/static/js/theme.js"></script>
    </div>
  </body>
</html>
