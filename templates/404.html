{{define "titleParts"}}BLANK{{end}}
{{define "closeButton"}}
<button
  id="terminal-close"
  class="terminal-btn"
  aria-label="Close terminal"
>
  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-linecap="round"
    width="18"
    height="18"
  >
    <path d="M4 4l16 16M4 20L20 4" />
  </svg>
</button>
{{end}}
{{define "content"}}
{{template "ascii" .}}
<main class="main main--404">
  {{template "title" .}}
  <div class="content-wrapper">
    {{template "terminal" .}}
  </div>
</main>
{{template "footer" .}}
{{end}} {{define "scripts"}}
<script src="/static/js/terminal.js"></script>
<script src="/static/js/easter-eggs.js"></script>
<script src="/static/js/cursor.js"></script>
<script src="/static/js/title.js"></script>
<script src="/static/js/hover-lift.js"></script>
{{end}}
