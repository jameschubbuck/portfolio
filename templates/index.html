</div>
<div class="ascii-corner ascii-right">

<main class="main">

    <div class="gap-row">

        href="https://www.linkedin.com/in/jameschubbuck/"
        target="_blank"
        class="outline-button"
        aria-label="LinkedIn"
      >
        <img src="/linkedin.svg" alt="" width="20" height="20" />
        LinkedIn
      </a>
      <a
        href="https://github.com/jameschubbuck"
        target="_blank"
        class="outline-button"
        aria-label="GitHub"
      >
        <img src="/github.svg" alt="" width="20" height="20" />
        GitHub
      </a>
      <a
        href="https://www.instagram.com/james.chubbuck/"
        target="_blank"
        class="outline-button"
        aria-label="Instagram"
      >
        <img src="/instagram.svg" alt="" width="20" height="20" />
        Instagram
      </a>
    </div>
    <div class="gap-row gap-row--wide">
      <a
        href="mailto:contact@jameschubbuck.com"
        target="_blank"
        class="outline-button outline-button--wide"
        aria-label="Contact"
      >
        <img src="/mail.svg" alt="" width="20" height="20" />
        Contact
      </a>
      <a
        href="/resume.pdf"
        target="_blank"
        class="outline-button outline-button--wide"
        aria-label="Resume"
      >
        <img src="/file.svg" alt="" width="20" height="20" />
        Resume
      </a>
    </div>
    <div class="gap-row">
      <a
        role="button"
        tabindex="0"
        class="outline-button"
        aria-label="Thoughts"
      >
        <img src="/lightbulb.svg" alt="" width="20" height="20" />
        Thoughts
      </a>
      <a
        role="button"
        tabindex="0"
        class="outline-button"
        aria-label="Gallery"
      >
        <img src="/camera.svg" alt="" width="20" height="20" />
        Gallery
      </a>
      <a
        role="button"
        tabindex="0"
        class="outline-button"
        aria-label="Ponderings"
      >
        <img src="/thought-bubble.svg" alt="" width="20" height="20" />
        Ponderings
      </a>
    </div>
</main>
<footer class="footer">
  <div class="footer-content">
    <img src="/footer-left.svg" alt="" class="footer-bracket" />
    <span id="footer-text" class="footer-text">Made with ❤️ in California</span>
    <img src="/footer-right.svg" alt="" class="footer-bracket" />
  </div>
</footer>
{{end}} {{define "scripts"}}
<script src="/static/js/terminal.js"></script>
<script src="/static/js/easter-eggs.js"></script>
<script>
(function() {
  document.querySelectorAll('a, button, [role="button"]').forEach(function(el) {
    el.classList.add('hover-lift');
  });
  const buttons = document.querySelectorAll('.hover-lift');
  var max = 4;
  buttons.forEach(function(btn) {
    btn.addEventListener('mousemove', function(e) {
      var r = btn.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width - 0.5;
      var y = (e.clientY - r.top) / r.height - 0.5;
      btn.style.transform = 'translate(' + (x * max * 2) + 'px,' + (y * max * 2) + 'px) scale(1.05)';
    });
    btn.addEventListener('mouseleave', function() {
      btn.style.transform = '';
    });
  });
})();
</script>
{{end}}
