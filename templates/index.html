{{define "content"}}
<div class="ascii-corner ascii-left">
  <a
    href="https://xkcd.com/344/"
    target="_blank"
    tabindex="-1"
    aria-hidden="true"
  >
    <pre>{{.Lackeys}}</pre>
  </a>
</div>
<div class="ascii-corner ascii-right">
  <a
    href="https://xkcd.com/344/"
    target="_blank"
    tabindex="-1"
    aria-hidden="true"
  >
    <pre>{{.Richard}}</pre>
  </a>
</div>
<main class="main">
  <h1 class="header">
    <span>ABOUT:</span>
    <span>JAMES</span>
    <span class="hide-narrow">CHUBBUCK</span>
  </h1>
  <div class="content-wrapper">
    <div id="terminal" class="terminal" role="log" aria-label="Terminal output">
      <div class="terminal-header">
        <button
          id="terminal-close"
          class="terminal-btn"
          aria-label="Close terminal"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="16"
            height="16"
          >
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
        <button
          id="theme-toggle"
          class="theme-toggle-btn"
          aria-label="Toggle theme"
        ></button>
      </div>
      <pre class="terminal-body"><code id="terminal-output"></code></pre>
    </div>
    <div class="gap-row">
      <a
        href="https://www.linkedin.com/in/jameschubbuck/"
        target="_blank"
        class="fancy-button"
        aria-label="LinkedIn"
      >
        <span class="button-content">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
            />
          </svg>
          LinkedIn
        </span>
      </a>
      <a
        href="mailto:contact@jameschubbuck.com"
        target="_blank"
        class="fancy-button"
        aria-label="Contact"
      >
        <span class="button-content">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="M22 4l-10 8L2 4" />
          </svg>
          Contact
        </span>
      </a>
      <a
        href="/resume.pdf"
        target="_blank"
        class="fancy-button"
        aria-label="Resume"
      >
        <span class="button-content">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="20"
            height="20"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          Resume
        </span>
      </a>
    </div>
  </div>
</main>
<footer class="footer">
  <div class="footer-content">
    <span class="footer-bracket">&lt;!--</span>
    <span id="footer-text" class="footer-text">Made with ❤️ in California</span>
    <span class="footer-bracket">--&gt;</span>
  </div>
</footer>
{{end}} {{define "scripts"}}
<script src="/static/js/terminal.js"></script>
<script src="/static/js/easter-eggs.js"></script>
{{end}}
