<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Chubbuck</title>
    <meta name="description" content="Student @ Stanford University." />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&family=Geist+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = window.matchMedia("(prefers-color-scheme:dark)").matches
            ? "dark"
            : "light";
        document.documentElement.classList.toggle("dark", t === "dark");
      })();
    </script>
  </head>
  <body>
    <div class="container">
      {{template "content" .}} {{block "scripts" .}}{{end}}
      <script src="/static/js/theme.js"></script>
    </div>
  </body>
</html>
